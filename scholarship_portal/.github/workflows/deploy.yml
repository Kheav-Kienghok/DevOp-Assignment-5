name: CI

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      run: docker build --no-cache -t kienghok/scholarship_portals:debug --target debug . 

    - name: Push Docker image
      run: docker push kienghok/scholarship_portals:debug

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Pull Docker image
      run: docker pull kienghok/scholarship_portals:debug

    - name: Delete Old Container
      run: docker-compose -f docker-compose.ci.yml down || true

    - name: Run Docker Compose in CI
      run: |
        docker-compose -f docker-compose.ci.yml up -d
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
        FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        EMAIL_VERIFICATION_API_URL: ${{ secrets.EMAIL_VERIFICATION_API_URL }}
        EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
        REMINDER_EMAIL_API_KEY: ${{ secrets.REMINDER_EMAIL_API_KEY }}
        REMINDER_EMAIL_API_URL: ${{ secrets.REMINDER_EMAIL_API_URL }}
        AWS_REGION: ${{ VARS.AWS_REGION }}
        AWS_BUCKET_NAME: ${{ VARS.AWS_BUCKET_NAME }}
        GIN_MODE: debug

    - name: Check running containers
      run: |
        sleep 10  # Wait a bit for containers to start
        docker-compose -f docker-compose.ci.yml ps
        
        if ! docker-compose -f docker-compose.ci.yml ps | grep "Up"; then
          echo "❌ Container failed to start!"
          docker-compose -f docker-compose.ci.yml logs
          exit 1
        else
          echo "✅ Container is running."
        fi